upstream campuseats_web {
  server web:8000;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 50m;

  # Public media URL consumed by mobile clients.
  # Proxy /media/* directly to the public MinIO bucket objects.
  location /media/ {
    proxy_pass http://minio:9000/campuseats-media/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://campuseats_web;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

