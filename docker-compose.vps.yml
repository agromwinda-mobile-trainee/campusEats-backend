services:
  web:
    build: .
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      - db
      - redis
      - minio
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - minio
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campuseats}
      POSTGRES_USER: ${POSTGRES_USER:-campuseats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campuseats}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_STORAGE_MEDIA_BUCKET: ${MINIO_STORAGE_MEDIA_BUCKET:-campuseats-media}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD;
      /usr/bin/mc mb --ignore-existing local/$MINIO_STORAGE_MEDIA_BUCKET;
      /usr/bin/mc anonymous set public local/$MINIO_STORAGE_MEDIA_BUCKET;
      exit 0;
      "
    restart: "no"

volumes:
  postgres_data:
  minio_data:
  redis_data:

